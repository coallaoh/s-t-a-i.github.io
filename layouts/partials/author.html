{{$current_author := .context}}
{{$suffix :=  .suffix}}
{{$name := .context.name}}
{{if isset $current_author "star"}}
  {{if $current_author.star }}
    {{$suffix = print "*" $suffix}}
  {{end}}
{{end}}
<span class="author-name">
    {{if isset .context "external_link"}}
        <a href="{{ .context.external_link }}">{{ $name }}</a>{{ $suffix }}
    {{else}}
        {{ $name }}{{ $suffix }}
    {{end}}
</span>
